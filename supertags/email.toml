name = "email"
description = "Email message parsed from MBOX"

# --- Common fields ---

[[fields]]
name = "privacy_tier"
type = "enum"
required = true
options = ["public", "personal", "sensitive", "shared"]

[[fields]]
name = "date_original"
type = "timestamp"

[[fields]]
name = "topic_path"
type = "text"

[[fields]]
name = "source_service"
type = "text"

[[fields]]
name = "ai_generated_fields"
type = "multi_select"

# --- Type-specific fields ---

[[fields]]
name = "sender"
type = "email"

[[fields]]
name = "recipient"
type = "email"

[[fields]]
name = "subject"
type = "text"

[[fields]]
name = "thread_id"
type = "text"

[[fields]]
name = "has_attachments"
type = "bool"
