name = "document"
description = "PDF, DOCX, scanned certificates, invoices, letters"

# --- Common fields ---

[[fields]]
name = "privacy_tier"
type = "enum"
required = true
options = ["public", "personal", "sensitive", "shared"]

[[fields]]
name = "date_original"
type = "timestamp"

[[fields]]
name = "topic_path"
type = "text"

[[fields]]
name = "source_service"
type = "text"

[[fields]]
name = "ai_generated_fields"
type = "multi_select"

# --- Type-specific fields ---

[[fields]]
name = "doc_type"
type = "enum"
options = ["invoice", "certificate", "letter", "contract", "receipt", "report", "other"]

[[fields]]
name = "page_count"
type = "number"

[[fields]]
name = "ocr_status"
type = "enum"
options = ["queued", "done", "failed", "skipped"]

[[fields]]
name = "title"
type = "text"

[[fields]]
name = "doc_number"
type = "text"
