name = "quest"
description = "A quest, project, or initiative"

# --- Common fields ---

[[fields]]
name = "privacy_tier"
type = "enum"
required = true
options = ["public", "personal", "sensitive", "shared"]

[[fields]]
name = "date_original"
type = "timestamp"

[[fields]]
name = "topic_path"
type = "text"

[[fields]]
name = "source_service"
type = "text"

[[fields]]
name = "ai_generated_fields"
type = "multi_select"

# --- Quest-specific fields ---

[[fields]]
name = "status"
type = "enum"
required = true
options = ["active", "completed", "paused", "blocked"]

[[fields]]
name = "owner"
type = "reference"
required = false
ref_tag = "person"

[[fields]]
name = "due_date"
type = "timestamp"
required = false

[[fields]]
name = "priority"
type = "enum"
required = false
options = ["low", "medium", "high", "critical"]

[[fields]]
name = "tags"
type = "multi_select"
required = false
options = ["personal", "community", "ecology", "tech", "art"]

[[fields]]
name = "description"
type = "rich_text"
required = false

# QuestHub-specific fields

[[fields]]
name = "category"
type = "enum"
required = false
options = ["tech", "society", "finance", "knowledge", "tools", "culture", "other"]

[[fields]]
name = "category_custom"
type = "text"
required = false

[[fields]]
name = "submitter_name"
type = "text"
required = false

[[fields]]
name = "contact"
type = "text"
required = false

[[fields]]
name = "lifecycle_stage"
type = "enum"
required = false
options = ["identified", "sprouting", "growing", "holon", "gifted"]

[[fields]]
name = "parent_project"
type = "text"
required = false
