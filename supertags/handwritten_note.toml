name = "handwritten_note"
description = "Scanned handwritten page"

# --- Common fields (on every content type) ---

[[fields]]
name = "privacy_tier"
type = "enum"
required = true
options = ["public", "personal", "sensitive", "shared"]

[[fields]]
name = "date_original"
type = "timestamp"

[[fields]]
name = "topic_path"
type = "text"

[[fields]]
name = "source_service"
type = "text"

[[fields]]
name = "ai_generated_fields"
type = "multi_select"

# --- Type-specific fields ---

[[fields]]
name = "ocr_status"
type = "enum"
options = ["queued", "done", "failed", "skipped"]

[[fields]]
name = "page_count"
type = "number"

[[fields]]
name = "has_drawing"
type = "bool"

[[fields]]
name = "has_handwriting"
type = "bool"

[[fields]]
name = "ocr_confidence"
type = "number"

[[fields]]
name = "title"
type = "text"

[[fields]]
name = "names"
type = "multi_select"

[[fields]]
name = "keywords"
type = "multi_select"
